name: Slack Auto-React (Approval, Merge, Comments & Ready for Review)

on:
  workflow_call:
    inputs:
      SLACK_CHANNEL_ID:
        required: true
        type: string

jobs:
  auto_react:
    if: |
      (github.event_name == 'pull_request' && (github.event.pull_request.merged == true || github.event.action == 'ready_for_review')) ||
      (github.event_name == 'pull_request_review' && github.event.review.state == 'approved') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request)

    runs-on: ubuntu-latest

    steps:
      - name: Search, React, and Comment on Slack Message
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ inputs.SLACK_CHANNEL_ID }}
          GITHUB_ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          PR_URL: ${{ github.event.pull_request.html_url || github.event.issue.html_url }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          REVIEW_STATE: ${{ github.event.review.state }}
          PR_ACTION: ${{ github.event.action }}
        run: |
          set -euo pipefail

          EMOJI=""
          COMMENT=""

          case "$EVENT_NAME" in
            pull_request)
              if [ "$PR_ACTION" = "ready_for_review" ]; then
                EMOJI="eyes"
                COMMENT=":eyes: Marked ready for review by $GITHUB_ACTOR"
              elif [ "$PR_MERGED" = "true" ]; then
                EMOJI="git-merged"
                COMMENT=":git-merged: PR merged"
              else
                echo "Pull request closed without merge; skipping."
                exit 0
              fi
              ;;
            pull_request_review)
              if [ "$REVIEW_STATE" != "approved" ]; then
                echo "Review state is '$REVIEW_STATE'; skipping."
                exit 0
              fi
              EMOJI="white_check_mark"
              COMMENT=":white_check_mark: Approved by $GITHUB_ACTOR"
              ;;
            issue_comment)
              EMOJI="speech_balloon"
              COMMENT=":speech_balloon: New comment by $GITHUB_ACTOR"
              ;;
            *)
              echo "Unsupported event: $EVENT_NAME"
              exit 0
              ;;
          esac

          HISTORY=$(curl -s -X GET \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            "https://slack.com/api/conversations.history?channel=$SLACK_CHANNEL_ID&limit=100")

          if [ "$(echo "$HISTORY" | jq -r '.ok')" != "true" ]; then
            echo "Slack API Error: $(echo "$HISTORY" | jq -r '.error')"
            exit 1
          fi

          TS=$(echo "$HISTORY" | jq -r --arg URL "$PR_URL" '.messages[]? | select(.text | contains($URL)) | .ts' | head -n 1)

          if [ -z "$TS" ] || [ "$TS" = "null" ]; then
            echo "No matching Slack message found for PR: $PR_URL"
            exit 0
          fi

          echo "Found matching message (TS: $TS). Adding :$EMOJI: reaction..."
          curl -s -X POST \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"channel\":\"$SLACK_CHANNEL_ID\",\"timestamp\":\"$TS\",\"name\":\"$EMOJI\"}" \
            https://slack.com/api/reactions.add > /dev/null

          echo "Posting thread comment..."
          COMMENT_RESULT=$(curl -s -X POST \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n --arg channel "$SLACK_CHANNEL_ID" --arg thread_ts "$TS" --arg text "$COMMENT" \
              '{channel: $channel, thread_ts: $thread_ts, text: $text}')" \
            https://slack.com/api/chat.postMessage)

          if [ "$(echo "$COMMENT_RESULT" | jq -r '.ok')" != "true" ]; then
            echo "Slack chat.postMessage error: $(echo "$COMMENT_RESULT" | jq -r '.error')"
            exit 1
          fi

          echo "Thread comment posted."
