name: Slack Auto-React

on:
  pull_request:
    types: [closed, ready_for_review]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

jobs:
  trigger-slack-reaction:
    uses: tractorzoom/.github/.github/workflows/shared-slack-logic.yml@master
    with:
      SLACK_CHANNEL_ID: ${{ vars.DATA_TEAM_PRS_SLACK_CHANNEL_ID }} 
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}