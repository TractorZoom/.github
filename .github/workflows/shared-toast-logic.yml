name: Slack Toast (Merge, Approval & Discussion)

on:
  workflow_call:
    inputs:
      SLACK_CHANNEL_ID:
        required: true
        type: string

jobs:
  toast_notify:
    if: |
      github.event_name == 'discussion_comment' ||
      (github.event_name == 'pull_request' && github.event.action == 'closed') ||
      (github.event_name == 'pull_request_review' && github.event.action == 'submitted')

    runs-on: ubuntu-latest

    steps:
      - name: Search Slack, React, and DM Poster
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_TOAST_BOT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_CHANNEL_ID: ${{ inputs.SLACK_CHANNEL_ID }}
          GITHUB_ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          REVIEW_STATE: ${{ github.event.review.state }}
          DISCUSSION_URL: ${{ github.event.discussion.html_url }}
        run: |
          set -euo pipefail

          EMOJI=""
          SEARCH_URL=""
          TOAST_MSG=""

          case "$EVENT_NAME" in
            pull_request)
              SEARCH_URL="$PR_URL"
              if [ "$PR_MERGED" = "true" ]; then
                EMOJI="git-merged"
                TOAST_MSG="Your shared PR was merged: $PR_URL"
              else
                TOAST_MSG="Your shared PR was closed: $PR_URL"
              fi
              ;;
            pull_request_review)
              SEARCH_URL="$PR_URL"
              if [ "$REVIEW_STATE" != "approved" ]; then
                echo "Review state is '$REVIEW_STATE'; skipping."
                exit 0
              fi
              EMOJI="white_check_mark"
              TOAST_MSG="Your shared PR was approved: $PR_URL"
              ;;
            discussion_comment)
              SEARCH_URL="$DISCUSSION_URL"
              TOAST_MSG="New comment on a discussion you shared: $DISCUSSION_URL"
              ;;
            *)
              echo "Unsupported event: $EVENT_NAME"
              exit 0
              ;;
          esac

          HISTORY=$(curl -s -X GET \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            "https://slack.com/api/conversations.history?channel=$SLACK_CHANNEL_ID&limit=100")

          if [ "$(echo "$HISTORY" | jq -r '.ok')" != "true" ]; then
            echo "Slack API Error: $(echo "$HISTORY" | jq -r '.error')"
            exit 1
          fi

          MATCH=$(echo "$HISTORY" | jq -r --arg URL "$SEARCH_URL" \
            '.messages[]? | select(.text | contains($URL)) | {ts, user} | @json' | head -n 1)

          if [ -z "$MATCH" ] || [ "$MATCH" = "null" ]; then
            echo "No matching Slack message found for: $SEARCH_URL"
            exit 0
          fi

          TS=$(echo "$MATCH" | jq -r '.ts')
          MSG_USER=$(echo "$MATCH" | jq -r '.user')

          echo "Found matching message (TS: $TS, user: $MSG_USER)."

          if [ -n "$EMOJI" ]; then
            echo "Adding :$EMOJI: reaction..."
            curl -s -X POST \
              -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "{\"channel\":\"$SLACK_CHANNEL_ID\",\"timestamp\":\"$TS\",\"name\":\"$EMOJI\"}" \
              https://slack.com/api/reactions.add > /dev/null
          fi

          GH_USER=$(curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/$GITHUB_ACTOR")
          GH_ID=$(echo "$GH_USER" | jq -r '.id')
          GH_EMAIL=$(echo "$GH_USER" | jq -r '.email // empty')
          GH_NOREPLY="${GH_ID}+${GITHUB_ACTOR}@users.noreply.github.com"

          SLACK_USER=$(curl -s \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            "https://slack.com/api/users.info?user=$MSG_USER")
          if [ "$(echo "$SLACK_USER" | jq -r '.ok')" != "true" ]; then
            echo "Slack users.info error: $(echo "$SLACK_USER" | jq -r '.error')"
            exit 1
          fi

          SLACK_EMAIL=$(echo "$SLACK_USER" | jq -r '.user.profile.email // empty')

          IS_POSTER=false
          if [ "$SLACK_EMAIL" = "$GH_NOREPLY" ]; then
            IS_POSTER=true
          elif [ -n "$GH_EMAIL" ] && [ "$SLACK_EMAIL" = "$GH_EMAIL" ]; then
            IS_POSTER=true
          fi

          if [ "$IS_POSTER" != "true" ]; then
            echo "Slack message author does not match GitHub actor ($GITHUB_ACTOR); skipping DM."
            exit 0
          fi

          echo "Message author matches GitHub actor. Sending DM..."
          DM=$(curl -s -X POST \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"users\":\"$MSG_USER\"}" \
            https://slack.com/api/conversations.open)

          if [ "$(echo "$DM" | jq -r '.ok')" != "true" ]; then
            echo "Slack conversations.open error: $(echo "$DM" | jq -r '.error')"
            exit 1
          fi

          DM_CHANNEL=$(echo "$DM" | jq -r '.channel.id')

          DM_RESULT=$(curl -s -X POST \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n --arg channel "$DM_CHANNEL" --arg text "$TOAST_MSG" '{channel: $channel, text: $text}')" \
            https://slack.com/api/chat.postMessage)

          if [ "$(echo "$DM_RESULT" | jq -r '.ok')" != "true" ]; then
            echo "Slack chat.postMessage error: $(echo "$DM_RESULT" | jq -r '.error')"
            exit 1
          fi

          echo "DM sent."
